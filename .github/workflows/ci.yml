name: Startup Intelligence CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-backend:
    name: Test Python Backend
    runs-on: ubuntu-latest
    env:
      API_KEY: "startup-intelligence-local-dev-key"

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # We need httpx for TestClient to work with async
        pip install flake8 pytest httpx pandas prophet slowapi fastapi uvicorn python-dotenv
        if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi

    - name: Preprocess Data (Sync Data Step)
      run: |
        python backend/app/scraping/seed_data.py
        # Optional: Sync 2025/2026 Unicorns
        python backend/app/scraping/update_unicorns_2025.py
      # Set PYTHONPATH so scripts can import 'app'
      env:
        PYTHONPATH: ${{ github.workspace }}/backend

    - name: Lint with flake8
      run: |
        flake8 backend/app --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 backend/app --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Run Pytest
      run: |
        pytest -v backend/tests/test_api.py
      env:
        PYTHONPATH: ${{ github.workspace }}/backend

  build-frontend:
    name: Build React Frontend
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
    - name: Install & Build
      run: |
        cd frontend
        npm install
        npm run build --if-present

  docker-check:
    name: Docker Environment Check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Build and test Docker composition (dry run)
      run: |
        # Simply testing if the Dockerfile is valid and builds
        docker build -t startup-api-test backend/
